<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 스크립트 & B-Roll</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <h1>유튜브 스크립트 & B-Roll</h1>
  <div class="header-actions">
    <a href="index.html" class="btn btn-secondary" style="text-decoration:none;">홈</a>
    <span class="runtime-display" id="runtimeDisplay" style="display:none">0:00</span>
    <button class="btn btn-secondary" id="newBtn" style="display:none" onclick="resetToUpload()">새 대본</button>
    <button class="btn btn-secondary" id="checklistBtn" style="display:none" onclick="openChecklist()">체크리스트</button>
    <button class="btn btn-secondary" id="scriptModeBtn" style="display:none" onclick="openScriptMode()">대본 보기</button>
    <button class="btn btn-primary" id="exportBtn" style="display:none" onclick="openExportModal()">HTML 내보내기</button>
    <button class="btn-icon" onclick="openHelp()" title="도움말" style="font-size:15px;">?</button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="다크/라이트 모드 전환">
      <span id="themeIcon">&#9788;</span>
    </button>
  </div>
</div>

<!-- Upload Screen -->
<div id="uploadScreen">
  <div class="upload-area" id="dropZone">
    <h2>파일을 드래그 & 드롭하세요</h2>
    <p>또는 아래 버튼을 클릭하여 파일을 선택하세요</p>
    <div class="file-types">
      <span class="file-type-badge md">.md 새 대본</span>
      <span class="file-type-badge html">.html 이어 편집</span>
    </div>
    <div class="upload-btn-wrapper">
      <button class="btn btn-primary">파일 선택</button>
      <input type="file" id="fileInput" accept=".md,.html,.htm">
    </div>
  </div>
</div>

<!-- Editor Screen -->
<div id="editorScreen" style="display:none">
  <div class="app-layout">
    <!-- TOC Sidebar -->
    <nav class="toc-sidebar" id="tocSidebar">
      <button class="toc-toggle" id="tocToggle" onclick="toggleToc()">&laquo;</button>
      <div class="toc-content" id="tocContent">
        <div class="toc-header">목차</div>
        <button class="toc-item meta-item" onclick="scrollToMeta()">영상 정보</button>
        <div id="tocList"></div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Sticky Meta Area -->
      <div class="meta-area" id="metaArea">
        <div class="meta-field full">
          <label>제목</label>
          <input type="text" id="metaTitle" placeholder="영상 제목" oninput="state.videoTitle=this.value; updateToc(); markDirty()">
        </div>
        <div class="meta-field">
          <label>썸네일</label>
          <input type="text" id="metaThumbnail" placeholder="썸네일 구상 메모" oninput="state.thumbnail=this.value; markDirty()">
        </div>
        <div class="meta-field">
          <label>타겟</label>
          <input type="text" id="metaTarget" placeholder="타겟 시청자" oninput="state.target=this.value; markDirty()">
        </div>
        <div class="meta-field full">
          <label>목적</label>
          <input type="text" id="metaPurpose" placeholder="이 영상의 목적" oninput="state.purpose=this.value; markDirty()">
        </div>
      </div>

      <!-- Sections -->
      <div class="sections-container" id="sectionsContainer"></div>
      <!-- Bulk action bar -->
      <div class="bulk-bar" id="bulkBar">
        <span id="bulkCount">0개 선택</span>
        <button class="btn btn-secondary" onclick="bulkMove(-1)">&#9650; 위로</button>
        <button class="btn btn-secondary" onclick="bulkMove(1)">&#9660; 아래로</button>
        <button class="btn btn-secondary" onclick="bulkDelete()">삭제</button>
        <button class="btn btn-secondary" onclick="clearSelection()" style="margin-left:auto;">선택 해제</button>
      </div>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>HTML 내보내기</h3>
    <label for="exportFilename">파일명</label>
    <input type="text" id="exportFilename" placeholder="YYYYMMDD_제목_v1.html">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeExportModal()">취소</button>
      <button class="btn btn-primary" onclick="doExport()">내보내기</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/broll.js"></script>
</body>
</html>
