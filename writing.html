<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원고 작성 — 유튜브 스크립트</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <h1>원고 작성 모드</h1>
  <div class="header-actions">
    <span class="runtime-display" id="runtimeDisplay">0:00</span>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'">홈</button>
    <button class="btn btn-secondary" onclick="exportAsMd()">MD 내보내기</button>
    <button class="btn btn-primary" onclick="goToBroll()">B-Roll 모드로 이동</button>
    <button class="btn-icon" onclick="openLandingHelp()" title="도움말" style="font-size:15px;">?</button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="다크/라이트 모드 전환">
      <span id="themeIcon">&#9788;</span>
    </button>
  </div>
</div>

<div class="writing-layout">
  <!-- TOC -->
  <nav class="toc-sidebar" id="tocSidebar">
    <button class="toc-toggle" id="tocToggle" onclick="toggleToc()">&laquo;</button>
    <div class="toc-content" id="tocContent">
      <div class="toc-header">목차</div>
      <button class="toc-item meta-item" onclick="scrollToMeta()">영상 정보</button>
      <div id="tocList"></div>
    </div>
  </nav>

  <!-- Benchmark panel -->
  <div class="bench-panel" id="benchPanel">
    <div id="benchTabs" class="bench-tabs"></div>
    <div id="benchContent"></div>
  </div>

  <!-- My script panel -->
  <div class="my-script-panel">
    <div class="meta-area" id="writingMeta">
      <div class="meta-field full">
        <label>제목</label>
        <input type="text" id="metaTitle" placeholder="영상 제목" oninput="state.videoTitle=this.value; updateToc(); markDirty()">
      </div>
      <div class="meta-field">
        <label>목적</label>
        <input type="text" id="metaPurpose" placeholder="이 영상의 목적" oninput="state.purpose=this.value; markDirty()">
      </div>
      <div class="meta-field">
        <label>타겟</label>
        <input type="text" id="metaTarget" placeholder="타겟 시청자" oninput="state.target=this.value; markDirty()">
      </div>
    </div>
    <div class="sections-container" id="sectionsContainer"></div>
  </div>
</div>

<!-- Help modal -->
<div class="modal-overlay" id="helpModal">
  <div class="modal" style="width:520px;">
    <h3>원고 작성 모드 — 도움말</h3>
    <div class="help-content">
      <h4>사용법</h4>
      <p><strong>왼쪽 패널:</strong> 벤치마킹 원고 (최대 2개). 탭으로 전환. 타임스탬프 자막(.txt) 또는 마크다운(.md) 파일을 업로드하세요.</p>
      <p><strong>오른쪽 패널:</strong> 내 원고. 벤치마킹을 참고하면서 내 스타일로 작성합니다.</p>
      <p>작성 완료 후 <strong>"B-Roll 모드로 이동"</strong> 버튼으로 촬영 계획 단계로 넘어갑니다.</p>

      <h4>단축키</h4>
      <ul>
        <li><kbd>Ctrl+S</kbd> 임시저장 | <kbd>Ctrl+Z</kbd> 되돌리기 | <kbd>Ctrl+E</kbd> MD 내보내기</li>
        <li><kbd>Ctrl+1/2/3</kbd> 제목에서 레벨 변경</li>
      </ul>
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-secondary" onclick="document.getElementById('helpModal').classList.remove('show')">닫기</button>
    </div>
  </div>
</div>

<script>window.AUTOSAVE_KEY = 'writing-autosave';</script>
<script src="js/common.js"></script>
<script src="js/writing.js"></script>
<script>
  function openLandingHelp() { document.getElementById('helpModal').classList.add('show'); }
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.getElementById('helpModal').classList.remove('show'); });
</script>
</body>
</html>
